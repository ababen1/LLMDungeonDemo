<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Dungeon Generator</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/ui/ui.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>Dungeon Generator</h1>
        <label>
          Seed
          <input id="seed" type="number" min="0" max="999999" value="42" />
        </label>
        <label>
          Difficulty: <span id="difficulty-label">3</span>
          <span class="hint">more rooms</span>
          <input id="difficulty" type="range" min="1" max="5" step="1" value="3" />
        </label>
        <label>
          Density: <span id="density-label">3</span>
          <span class="hint">smaller grid</span>
          <input id="density" type="range" min="1" max="5" step="1" value="3" />
        </label>
        <button id="generate">Generate</button>
        <div id="status" class="status status-idle">Ready.</div>
        <div id="log-panel">
          <div class="log-header">
            <span>Log</span>
            <button id="clear-log" type="button">Clear</button>
          </div>
          <div id="log" class="log-content" aria-live="polite"></div>
        </div>
      </aside>
      <main id="main-panel">
        <div class="view-tabs" role="tablist">
          <button id="tab-map" type="button" class="view-tab view-tab-active" role="tab" aria-selected="true">Map</button>
          <button id="tab-json" type="button" class="view-tab" role="tab" aria-selected="false">JSON</button>
        </div>
        <div id="map-view" class="view-panel" role="tabpanel">
          <div id="map-legend" class="map-legend"></div>
          <canvas id="dungeon-canvas"></canvas>
        </div>
        <div id="json-view" class="view-panel view-hidden" role="tabpanel">
          <div class="json-toolbar">
            <button id="copy-json" type="button">Copy JSON</button>
            <button id="validate-json" type="button">Validate</button>
          </div>
          <div id="json-validate-result" class="json-validate-result json-validate-idle"></div>
          <pre id="json-output" class="json-output">No dungeon generated yet.</pre>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
